version: 2
name: viral-thumbnail-v2

defaults:
  light: "Bright, clean, professional lighting. Well-lit face, no dark shadows"
  film_stock: "Clean sharp image, natural colors, high contrast between subject and background"
  anti_ai: >-
    Photorealistic photograph. The image must instantly grab attention
    when seen as a small thumbnail on a phone screen.
    One single clear focal point. Clean uncluttered background.
    The overall feeling should be BRIGHT, POSITIVE, and HIGH-ENERGY.
  constraints: >-
    No text, no letters, no words, no logos, no watermarks anywhere.
    Vertical portrait orientation (9:16 aspect ratio).
    Bright enough that white text overlaid on the upper half will be readable
    against the clean background.
  negative_prompt: >-
    Do NOT include: neon lighting, teal-and-orange grading,
    glossy plastic skin, particle effects, lens flares,
    god-rays, cyberpunk aesthetic, gradient backgrounds,
    abstract shapes, geometric patterns, robots, cyborgs,
    watermarks, perfect bilateral symmetry,
    HDR look, digital art style, fire, smoke,
    glowing elements, dark gloomy atmosphere, desaturated colors,
    horror aesthetic, stock photo smile.

cameras:
  - "Shot on a professional camera with a 50mm lens"
  - "Shot on a professional camera with a 35mm lens"
  - "Shot on a professional camera with an 85mm portrait lens"

slide_types:
  hook:
    composition: >-
      Subject positioned in center-bottom third of frame.
      Upper 50% is clean negative space for text overlay.
      Shallow depth of field, background softly blurred.
      Subject is the single clear focal point.
  chapter_title:
    composition: >-
      Wide shot with subject small but visible.
      At least 60% clean negative space.
      Very simple composition with one focal point.
  emphasis:
    composition: >-
      Medium close-up, subject fills bottom half.
      Upper half has clean soft-focus background.
      Strong eye contact with camera.
  body:
    composition: >-
      Medium shot, subject slightly off-center.
      One side has clean negative space for text.
      Simple uncluttered composition.
  cta:
    composition: >-
      Clean wide shot, subject centered but small.
      Maximum negative space. Minimal visual elements.

